version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgloader:
    image: ghcr.io/dimitri/pgloader:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migration/simpsons.sqlite3:/data/simpsons.sqlite3
    command: >
      pgloader
      sqlite:///data/simpsons.sqlite3
      postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./simpsonapi_playground:/app/simpsonapi_playground # hot reload

volumes:
  pg_data:
